<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stand Konfiguratör</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #e8602c;
    --accent2: #f0a060;
    --panel-w: 300px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  #topbar {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .topnav { display: flex; gap: 4px; }
  .topnav button {
    background: none; border: none; color: var(--muted);
    font-size: 12px; font-family: inherit; cursor: pointer;
    padding: 6px 14px; border-radius: 6px; letter-spacing: 0.04em;
    text-transform: uppercase; font-weight: 500; transition: all 0.15s;
  }
  .topnav button:hover { color: var(--text); background: var(--surface2); }
  .topnav button.act { color: var(--accent); }

  .price-display {
    display: flex; align-items: baseline; gap: 6px;
  }
  .price-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .price-amount { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }

  /* LAYOUT */
  #body { display: flex; flex: 1; min-height: 0; }

  /* 3D VIEWPORT */
  #viewport {
    flex: 1;
    position: relative;
    background: #3a3d42;
    cursor: grab;
  }
  #viewport:active { cursor: grabbing; }
  #viewport canvas { display: block; width: 100% !important; height: 100% !important; }

  #price-tag {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.6); color: #fff;
    font-size: 15px; font-weight: 600; padding: 6px 14px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
    font-family: 'DM Mono', monospace;
  }

  #hint {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.9);
    font-size: 11px; padding: 5px 14px; border-radius: 20px;
    pointer-events: none; letter-spacing: 0.04em;
    animation: fadeout 3s 2s forwards;
  }
  @keyframes fadeout { to { opacity: 0; } }

  #view-btns {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  .vbtn {
    padding: 10px 24px; border: none; border-radius: 24px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.02em; transition: all 0.2s;
  }
  .vbtn-primary { background: var(--accent); color: #fff; }
  .vbtn-primary:hover { background: #d05520; transform: translateY(-1px); }
  .vbtn-sec { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.18); }
  .vbtn-sec:hover { background: rgba(0,0,0,0.7); }

  #angle-btns {
    position: absolute; top: 12px; left: 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .abtn {
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
    color: #aaa; font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 5px 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .abtn:hover { color: #fff; border-color: var(--accent); background: rgba(0,0,0,0.75); }

  /* PANEL */
  #panel {
    width: var(--panel-w);
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .ptab {
    flex: 1; padding: 12px 4px; text-align: center;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .ptab:hover { color: var(--text); }
  .ptab.act { color: var(--accent); border-bottom-color: var(--accent); }

  #panel-body {
    flex: 1; overflow-y: auto; padding: 16px;
    scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
  }
  #panel-body::-webkit-scrollbar { width: 4px; }
  #panel-body::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .section { margin-bottom: 20px; }
  .section-label {
    font-size: 10px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
  }

  /* Sub tabs */
  .stabs {
    display: flex; gap: 0; margin-bottom: 16px;
    border: 1px solid var(--border2); border-radius: 8px; overflow: hidden;
  }
  .stab {
    flex: 1; padding: 8px 6px; text-align: center;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); cursor: pointer;
    transition: all 0.15s; border-right: 1px solid var(--border2);
  }
  .stab:last-child { border-right: none; }
  .stab:hover { color: var(--text); background: var(--surface2); }
  .stab.act { color: var(--accent); background: rgba(232,96,44,0.12); }

  /* Layout options */
  .layout-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 16px; }
  .layout-opt {
    aspect-ratio: 1; border: 1px solid var(--border2); border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: var(--surface2);
  }
  .layout-opt:hover { border-color: var(--accent); }
  .layout-opt.sel { border-color: var(--accent); background: rgba(232,96,44,0.15); }
  .layout-opt svg { width: 32px; height: 32px; }

  /* Sliders */
  .slider-block { margin-bottom: 14px; }
  .slider-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .slider-head span { font-size: 12px; color: var(--muted); }
  .slider-head strong { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); }
  input[type=range] {
    width: 100%; -webkit-appearance: none; height: 3px;
    background: var(--border2); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    border: 2px solid var(--bg);
  }

  /* Color dots */
  .color-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .cdot {
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
    position: relative;
  }
  .cdot.sel { border-color: var(--text); transform: scale(1.15); }
  .cdot:hover { transform: scale(1.1); }

  /* Material options */
  .mat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; }
  .mat-opt {
    padding: 10px 8px; border: 1px solid var(--border2); border-radius: 8px;
    cursor: pointer; text-align: center; transition: all 0.15s; background: var(--surface2);
  }
  .mat-opt:hover { border-color: var(--accent); }
  .mat-opt.sel { border-color: var(--accent); background: rgba(232,96,44,0.12); }
  .mat-opt .mat-name { font-size: 11px; font-weight: 500; margin-bottom: 2px; }
  .mat-opt .mat-price { font-size: 10px; color: var(--muted); font-family: 'DM Mono',monospace; }

  /* Furniture catalog */
  .furn-search {
    width: 100%; padding: 8px 12px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: 12px; margin-bottom: 14px; outline: none;
  }
  .furn-search:focus { border-color: var(--accent); }
  .furn-cat-label {
    font-size: 10px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; margin: 12px 0 8px;
  }
  .furn-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; }
  .furn-card {
    border: 1px solid var(--border2); border-radius: 8px; padding: 10px 8px;
    cursor: pointer; text-align: center; transition: all 0.15s; background: var(--surface2);
  }
  .furn-card:hover { border-color: var(--accent); }
  .furn-card.sel { border-color: var(--accent); background: rgba(232,96,44,0.1); }
  .furn-card.pending { border-color: #e8602c; background: rgba(232,96,44,0.18); animation: pulse 1s infinite alternate; }
  @keyframes pulse { from { opacity:0.8; } to { opacity:1; } }
  .furn-card .fi { font-size: 20px; display: block; margin-bottom: 4px; }
  .furn-card .fn { font-size: 10px; color: var(--muted); line-height: 1.3; margin-bottom: 3px; }
  .furn-card .fp { font-size: 11px; font-weight: 600; font-family: 'DM Mono',monospace; color: var(--text); }

  /* Cart */
  .cart-section { margin-top: 14px; }
  .cart-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .cart-item {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; padding: 7px 10px; background: var(--surface2);
    border-radius: 7px; margin-bottom: 4px;
  }
  .cart-item .ci-name { flex: 1; color: var(--text); }
  .cart-item .ci-price { font-family: 'DM Mono',monospace; font-size: 11px; color: var(--muted); margin-right: 8px; }
  .cart-item .ci-rm {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0 2px;
  }
  .cart-item .ci-rm:hover { color: var(--accent); }

  /* Info tab */
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .info-row:last-child { border: none; }
  .info-row .ik { color: var(--muted); }
  .info-row .iv { font-weight: 500; font-family: 'DM Mono', monospace; font-size: 11px; }
  .info-total { font-size: 14px !important; }
  .info-total .ik { color: var(--text) !important; font-weight: 600; }
  .info-total .iv { color: var(--accent) !important; font-size: 16px !important; font-weight: 600; }

  .note-box {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 12px; margin-bottom: 16px;
    font-size: 11px; color: var(--muted); line-height: 1.6;
  }

  .full-btn {
    width: 100%; padding: 12px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-family: inherit; font-size: 13px;
    font-weight: 600; cursor: pointer; letter-spacing: 0.02em; margin-top: 12px;
    transition: all 0.2s;
  }
  .full-btn:hover { background: #d05520; transform: translateY(-1px); }

  /* Upload */
  .upload-area {
    border: 1px dashed var(--border2); border-radius: 8px;
    padding: 14px; text-align: center; cursor: pointer;
    font-size: 11px; color: var(--muted); transition: all 0.15s;
  }
  .upload-area:hover { border-color: var(--accent); color: var(--accent); }

  select {
    width: 100%; padding: 9px 10px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: 12px; outline: none;
  }
  select:focus { border-color: var(--accent); }

  /* Quote modal */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 1000;
    align-items: center; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 28px; width: 360px; max-width: 95vw;
  }
  #modal h2 { font-size: 18px; margin-bottom: 6px; }
  #modal p { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .form-field { margin-bottom: 12px; }
  .form-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-field input, .form-field textarea {
    width: 100%; padding: 9px 12px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: 13px; outline: none;
  }
  .form-field input:focus, .form-field textarea:focus { border-color: var(--accent); }
  .form-field textarea { height: 72px; resize: none; }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btn-cancel {
    flex: 1; padding: 10px; background: none; border: 1px solid var(--border2);
    color: var(--muted); border-radius: 8px; font-family: inherit; cursor: pointer;
  }
  .modal-btn-send {
    flex: 2; padding: 10px; background: var(--accent); border: none;
    color: #fff; border-radius: 8px; font-family: inherit; font-weight: 600; cursor: pointer;
  }
  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 768px) {
    :root { --panel-w: 100%; }

    body { height: 100dvh; }

    #topbar {
      padding: 0 12px;
      height: 48px;
    }
    .logo { font-size: 12px; }
    .logo-mark { width: 24px; height: 24px; font-size: 11px; }
    .topnav { display: none; }
    .price-display { gap: 4px; }
    .price-label { display: none; }
    .price-amount { font-size: 16px; }

    #body {
      flex-direction: column;
    }

    #viewport {
      flex: 1;
      min-height: 45dvh;
    }

    #panel {
      width: 100%;
      max-height: 50dvh;
      border-left: none;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #panel-tabs .ptab {
      padding: 10px 2px;
      font-size: 9px;
      letter-spacing: 0.04em;
    }

    #panel-body {
      padding: 12px;
    }

    .stabs .stab { font-size: 9px; padding: 7px 3px; }

    .layout-grid { grid-template-columns: repeat(4,1fr); gap: 5px; }
    .layout-opt { border-radius: 6px; }

    .furn-grid { grid-template-columns: repeat(3,1fr); gap: 5px; }
    .furn-card { padding: 8px 4px; }
    .furn-card .fi { font-size: 16px; }
    .furn-card .fn { font-size: 9px; }
    .furn-card .fp { font-size: 10px; }

    .mat-grid { grid-template-columns: repeat(3,1fr); }

    #angle-btns { top: 8px; left: 8px; gap: 3px; }
    .abtn { padding: 4px 8px; font-size: 10px; }

    #view-btns { bottom: 8px; gap: 6px; }
    .vbtn { padding: 8px 16px; font-size: 12px; }

    #price-tag { top: 8px; right: 8px; font-size: 13px; padding: 5px 10px; }

    #modal { width: 92vw; padding: 20px; }
    #modal h2 { font-size: 16px; }

    .section-label { font-size: 10px; }
    .slider-head span { font-size: 11px; }
    .slider-head strong { font-size: 12px; }

    .color-row .cdot { width: 20px; height: 20px; }
  }

  @media (max-width: 420px) {
    .furn-grid { grid-template-columns: repeat(2,1fr); }
    .mat-grid { grid-template-columns: repeat(2,1fr); }
    #panel-tabs .ptab { font-size: 8px; padding: 9px 1px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">
    <div class="logo-mark">◈</div>
    Stand Konfiguratör
  </div>
  <div class="topnav">
    <button class="act">Konfiguratör</button>
    <button>SSS</button>
    <button>İletişim</button>
  </div>
  <div class="price-display">
    <span class="price-label">Tahmini</span>
    <span class="price-amount" id="topPrice">₺0</span>
  </div>
</div>

<!-- BODY -->
<div id="body">

  <!-- 3D VIEWPORT -->
  <div id="viewport">
    <div id="angle-btns">
      <button class="abtn" onclick="setView('front')">ÖN</button>
      <button class="abtn" onclick="setView('side')">YAN</button>
      <button class="abtn" onclick="setView('top')">ÜST</button>
      <button class="abtn" onclick="setView('iso')">3D</button>
    </div>
    <div id="hint">↔ Sürükle · Scroll: Zoom</div>
    <div id="price-tag">₺<span id="ptxt">0</span></div>
    <div id="view-btns">
      <button class="vbtn vbtn-sec" onclick="resetView()">⟳ Sıfırla</button>
      <button class="vbtn vbtn-primary" onclick="openModal()">Teklif Al →</button>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panel">
    <div id="panel-tabs">
      <div class="ptab act" onclick="setTab('stand')">STAND</div>
      <div class="ptab" onclick="setTab('pantry')">PANTRY</div>
      <div class="ptab" onclick="setTab('furniture')">MOBİLYA</div>
      <div class="ptab" onclick="setTab('info')">BİLGİ</div>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<!-- QUOTE MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Teklif İste</h2>
    <p>Konfigürasyonunuzu kaydedip size özel fiyat teklifi alalım.</p>
    <div class="form-field"><label>Ad Soyad</label><input type="text" placeholder="Ahmet Yılmaz" id="f-name"></div>
    <div class="form-field"><label>E-posta</label><input type="email" placeholder="info@firma.com" id="f-email"></div>
    <div class="form-field"><label>Fuar / Etkinlik</label><input type="text" placeholder="TÜYAP 2025" id="f-event"></div>
    <div class="form-field"><label>Notlar</label><textarea placeholder="Özel istekleriniz..." id="f-notes"></textarea></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">İptal</button>
      <button class="modal-btn-send" onclick="sendQuote()">Gönder →</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
const S = {

  w: 5, d: 3,

  floorColor: 0x2a2a4a,

  wallTexObj: null,       // THREE.Texture reference
  pantryPos: 'none',

  cart: [],

const WALL_COLORS = [

  {h:'#1a1a2e',v:0x1a1a2e},{h:'#888780',v:0x888780},{h:'#c8a96e',v:0xc8a96e},
];
const FLOOR_COLORS = [
  {h:'#2a2a4a',v:0x2a2a4a},{h:'#1a2a1a',v:0x1a2a1a},{h:'#3a2a1a',v:0x3a2a1a},
  {h:'#1a1a1a',v:0x1a1a1a},{h:'#222244',v:0x222244},{h:'#442222',v:0x442222},
  {h:'#224422',v:0x224422},{h:'#444422',v:0x444422},{h:'#c8c8c8',v:0xc8c8c8},
  {h:'#8B6914',v:0x8B6914},{h:'#444',v:0x444444},{h:'#cc6600',v:0xcc6600},
];

const FURNITURE = [
  {cat:'Counterlar',items:[
    {id:'lc1',n:'LED Counter 1m',p:8500,icon:'🗂'},{id:'lc2',n:'LED Counter 2m',p:17000,icon:'🗂'},
    {id:'lc3',n:'LED Counter 3m',p:25500,icon:'🗂'},{id:'lc4',n:'LED Counter 4m',p:34000,icon:'🗂'},
  ]},
  {cat:'Eye Catcher',items:[
    {id:'ec1',n:'Yuvarlak',p:6700,icon:'🔵'},{id:'ec2',n:'Düz',p:6400,icon:'📐'},
    {id:'ec3',n:'Vitrin',p:0,icon:'🏆'},
  ]},
  {cat:'Sandalyeler',items:[
    {id:'ch1',n:'Standart',p:970,icon:'🪑'},{id:'ch2',n:'Highchair',p:1140,icon:'🪑'},
    {id:'ch3',n:'Lüx',p:1590,icon:'🪑'},{id:'ch4',n:'Highchair Lüx',p:1400,icon:'🪑'},
  ]},

function totalPrice() {
  let base = 20000 + S.w * 4500 + S.d * 3000;
  if(S.floorMat === 'vinyl') base += 5000;
  if(S.floorMat === 'highgloss') base += 10000;
  if(S.wallGraphic) base += 13000;
  if(S.pantryPos !== 'none') base += S.pantrySize === '2x2' ? 20000 : 10000;
  if(S.layout === 1 || S.layout === 2) base += 8000;
  if(S.layout === 3) base += 18000;
  S.cart.forEach(c => base += c.p);
  return base;
}

// ─── BUILD STAND ─────────────────────────────────────────
function buildStand() {
  while(standGroup.children.length) standGroup.remove(standGroup.children[0]);

  const W = S.w, D = S.d, H = 2.5;
  const wMat = new THREE.MeshLambertMaterial({ color: S.wallColor });
  const wMatDark = new THREE.MeshLambertMaterial({ color: darkenHex(S.wallColor, 0.7) });
  const floorM = new THREE.MeshLambertMaterial({ color: S.floorColor });

  // Raised floor platform
  const platform = new THREE.Mesh(
    new THREE.BoxGeometry(W, 0.08, D),
    floorM
  );
  platform.position.set(0, 0.04, 0);
  platform.receiveShadow = true;
  platform.castShadow = true;
  standGroup.add(platform);

  // Back wall — with optional uploaded texture
  let backWallMat;
  if(S.wallTexObj) {
    backWallMat = new THREE.MeshLambertMaterial({ map: S.wallTexObj });
  } else {
    backWallMat = new THREE.MeshLambertMaterial({ color: S.wallColor });
  }
  const backWall = new THREE.Mesh(
    new THREE.BoxGeometry(W, H, 0.12),
    backWallMat
  );
  backWall.position.set(0, H/2 + 0.08, -D/2);
  backWall.castShadow = true;
  backWall.receiveShadow = true;
  standGroup.add(backWall);

  // Wall graphic overlay (only if no custom texture uploaded)
  if(S.wallGraphic && !S.wallTexObj) {
    const gMat = new THREE.MeshLambertMaterial({ color: lightenHex(S.wallColor, 1.35) });
    const graphicPanel = new THREE.Mesh(
      new THREE.BoxGeometry(W * 0.85, H * 0.7, 0.02),
      gMat
    );
    graphicPanel.position.set(0, H * 0.55 + 0.08, -D/2 + 0.07);
    standGroup.add(graphicPanel);
    const logoBg = new THREE.Mesh(
      new THREE.BoxGeometry(W * 0.3, H * 0.15, 0.03),
      new THREE.MeshLambertMaterial({ color: darkenHex(S.wallColor, 0.6) })
    );
    logoBg.position.set(0, H * 0.72 + 0.08, -D/2 + 0.085);
    standGroup.add(logoBg);
  }

  // Side walls based on layout
  if(S.layout === 1 || S.layout === 3) {
    // Left wall
    const lw = new THREE.Mesh(new THREE.BoxGeometry(0.12, H, D), wMatDark);
    lw.position.set(-W/2, H/2 + 0.08, 0);
    lw.castShadow = true;
    standGroup.add(lw);
  }
  if(S.layout === 2 || S.layout === 3) {
    // Right wall
    const rw = new THREE.Mesh(new THREE.BoxGeometry(0.12, H, D), wMatDark);
    rw.position.set(W/2, H/2 + 0.08, 0);
    rw.castShadow = true;
    standGroup.add(rw);
  }

  // No ceiling frame on stand — open hall look
  // Soft warm fill lights above stand (invisible, just for warmth)
  const numSpots = Math.ceil(W / 2);
  for(let i = 0; i < numSpots; i++) {
    const sx = -W/2 + (W / numSpots) * (i + 0.5);
    const spotLight = new THREE.PointLight(0xfff4dd, 0.4, 8);
    spotLight.position.set(sx, H + 1.5, 0);
    standGroup.add(spotLight);
  }

  // ── PANTRY — kapalı oda, stand içinde köşede, kapılı ──
  if(S.pantryPos !== 'none') {
    const pW = S.pantrySize === '2x2' ? 2 : 1.4;
    const pD = S.pantrySize === '2x2' ? 2 : 1.4;
    const pH = H;
    const wallT = 0.08;

    const cornerX = S.pantryPos === 'left' ? -W/2 + pW/2 : W/2 - pW/2;
    const cornerZ = -D/2 + pD/2;

    const pMat  = new THREE.MeshLambertMaterial({ color: darkenHex(S.wallColor, 0.72) });
    const pMat2 = new THREE.MeshLambertMaterial({ color: darkenHex(S.wallColor, 0.62) });
    const doorMat = new THREE.MeshLambertMaterial({ color: lightenHex(S.wallColor, 1.2) });
    const doorFrameMat = new THREE.MeshLambertMaterial({ color: darkenHex(S.wallColor, 0.5) });

    const dW = Math.min(pW, pD) * 0.55;  // kapı genişliği
    const dH = pH * 0.82;
    const dT = 0.05;

    // ── ARKA DUVAR (her zaman tam kapalı) ──
    const backP = new THREE.Mesh(new THREE.BoxGeometry(pW, pH, wallT), pMat);
    backP.position.set(cornerX, pH/2 + 0.08, -D/2 + wallT/2);
    backP.castShadow = true; backP.receiveShadow = true;
    standGroup.add(backP);

    // ── DIŞ YAN DUVAR (stand'ın dış kenarı — her zaman tam kapalı) ──
    const sideX = S.pantryPos === 'left' ? -W/2 + wallT/2 : W/2 - wallT/2;
    const sideWallFull = new THREE.Mesh(new THREE.BoxGeometry(wallT, pH, pD), pMat);
    sideWallFull.position.set(sideX, pH/2 + 0.08, cornerZ);
    sideWallFull.castShadow = true; sideWallFull.receiveShadow = true;
    standGroup.add(sideWallFull);

    // ── İÇ YAN DUVAR (stand merkezine bakan yüz — kapı 'yan' ise kapılı) ──
    // Sol pantry: iç yüz = cornerX + pW/2 konumunda
    // Sağ pantry: iç yüz = cornerX - pW/2 konumunda
    const innerSideX = S.pantryPos === 'left' ? cornerX + pW/2 - wallT/2 : cornerX - pW/2 + wallT/2;

    if(S.pantryDoor === 'side') {
      // İç yan duvarda kapı açıklığı — derinlik boyunca 2 parça + üst
      const sideRemain = (pD - dW) / 2;
      // Arka parça (arka duvara yakın)
      const sv1 = new THREE.Mesh(new THREE.BoxGeometry(wallT, pH, sideRemain), pMat);
      sv1.position.set(innerSideX, pH/2 + 0.08, -D/2 + sideRemain/2);
      sv1.castShadow = true; standGroup.add(sv1);
      // Ön parça (öne yakın)
      const sv2 = new THREE.Mesh(new THREE.BoxGeometry(wallT, pH, sideRemain), pMat);
      sv2.position.set(innerSideX, pH/2 + 0.08, -D/2 + pD - sideRemain/2);
      sv2.castShadow = true; standGroup.add(sv2);
      // Üst parça (kapı üstü)
      const svTop = new THREE.Mesh(new THREE.BoxGeometry(wallT, pH - dH, dW), pMat);
      svTop.position.set(innerSideX, dH + (pH - dH)/2 + 0.08, cornerZ);
      standGroup.add(svTop);
      // Kapı çerçevesi
      [[-D/2 + sideRemain, cornerZ], [-D/2 + pD - sideRemain, cornerZ]].forEach(([fz]) => {
        const fv = new THREE.Mesh(new THREE.BoxGeometry(wallT + 0.04, dH + 0.06, 0.06), doorFrameMat);
        fv.position.set(innerSideX, dH/2 + 0.08, fz); standGroup.add(fv);
      });
      const fhSide = new THREE.Mesh(new THREE.BoxGeometry(wallT + 0.04, 0.06, dW + 0.1), doorFrameMat);
      fhSide.position.set(innerSideX, dH + 0.08, cornerZ); standGroup.add(fhSide);
      // Kapı kanadı — stand alanı içine doğru açılıyor
      // Sol pantry: iç duvar sağda, kapı daha da sağa (+X) açılır → stand merkezi
      // Sağ pantry: iç duvar solda, kapı daha sola (-X) açılır → stand merkezi
      const inwardSign = S.pantryPos === 'left' ? 1 : -1;
      const doorSide = new THREE.Mesh(new THREE.BoxGeometry(dT, dH, dW * 0.95), doorMat);
      doorSide.position.set(
        innerSideX + inwardSign * dW * 0.35,
        dH/2 + 0.08,
        cornerZ + dW * 0.2
      );
      doorSide.rotation.y = S.pantryPos === 'left' ? Math.PI * 0.28 : -Math.PI * 0.28;
      doorSide.castShadow = true; standGroup.add(doorSide);
      // Kapı kolu
      const handleS = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.12, 6),
        new THREE.MeshLambertMaterial({ color: 0xccaa55 }));
      handleS.rotation.x = Math.PI/2;
      handleS.position.set(innerSideX + inwardSign * 0.07, dH * 0.45 + 0.08, cornerZ + dW * 0.3);
      standGroup.add(handleS);
    } else {
      // İç yan duvar tam kapalı (kapı öndeyse)
      const innerSideFull = new THREE.Mesh(new THREE.BoxGeometry(wallT, pH, pD), pMat);
      innerSideFull.position.set(innerSideX, pH/2 + 0.08, cornerZ);
      innerSideFull.castShadow = true; standGroup.add(innerSideFull);
    }

    // ── ÖN DUVAR (kapı 'front' ise kapılı, değilse tam) ──
    const frontZ = -D/2 + pD - wallT/2;

    if(S.pantryDoor !== 'side') {
      // Ön duvarda kapı — 2 yan parça + üst
      const frontRemain = (pW - dW) / 2;
      const fp1 = new THREE.Mesh(new THREE.BoxGeometry(frontRemain, pH, wallT), pMat);
      fp1.position.set(cornerX - pW/2 + frontRemain/2, pH/2 + 0.08, frontZ);
      fp1.castShadow = true; standGroup.add(fp1);
      const fp2 = new THREE.Mesh(new THREE.BoxGeometry(frontRemain, pH, wallT), pMat);
      fp2.position.set(cornerX + pW/2 - frontRemain/2, pH/2 + 0.08, frontZ);
      fp2.castShadow = true; standGroup.add(fp2);
      // Üst
      const fpTop = new THREE.Mesh(new THREE.BoxGeometry(dW, pH - dH, wallT), pMat);
      fpTop.position.set(cornerX, dH + (pH - dH)/2 + 0.08, frontZ);
      standGroup.add(fpTop);
      // Kapı çerçevesi ön
      const fvFL = new THREE.Mesh(new THREE.BoxGeometry(0.06, dH + 0.06, wallT + 0.04), doorFrameMat);
      fvFL.position.set(cornerX - dW/2, dH/2 + 0.08, frontZ); standGroup.add(fvFL);
      const fvFR = new THREE.Mesh(new THREE.BoxGeometry(0.06, dH + 0.06, wallT + 0.04), doorFrameMat);
      fvFR.position.set(cornerX + dW/2, dH/2 + 0.08, frontZ); standGroup.add(fvFR);
      const fhF = new THREE.Mesh(new THREE.BoxGeometry(dW + 0.1, 0.06, wallT + 0.04), doorFrameMat);
      fhF.position.set(cornerX, dH + 0.08, frontZ); standGroup.add(fhF);
      // Kapı kanadı (ön duvarda, içe açılıyor)
      const doorFront = new THREE.Mesh(new THREE.BoxGeometry(dW * 0.95, dH, dT), doorMat);
      doorFront.position.set(cornerX - dW * 0.25, dH/2 + 0.08, frontZ + dW * 0.35);
      doorFront.rotation.y = Math.PI * 0.28;
      doorFront.castShadow = true; standGroup.add(doorFront);
      // Kapı kolu ön
      const handleF = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.12, 6),
        new THREE.MeshLambertMaterial({ color: 0xccaa55 }));
      handleF.rotation.z = Math.PI/2;
      handleF.position.set(cornerX + dW * 0.3, dH * 0.45 + 0.08, frontZ + 0.06);
      standGroup.add(handleF);
    } else {
      // Ön duvar tam kapalı
      const frontFull = new THREE.Mesh(new THREE.BoxGeometry(pW, pH, wallT), pMat);
      frontFull.position.set(cornerX, pH/2 + 0.08, frontZ);
      frontFull.castShadow = true; standGroup.add(frontFull);
    }

    // ── TAVAN ──
    const ceilP = new THREE.Mesh(new THREE.BoxGeometry(pW, wallT, pD), pMat2);
    ceilP.position.set(cornerX, pH + 0.08, cornerZ);
    standGroup.add(ceilP);

    // ── ZEMİN ──
    const floorP = new THREE.Mesh(new THREE.BoxGeometry(pW, 0.09, pD),
      new THREE.MeshLambertMaterial({ color: darkenHex(S.floorColor, 0.85) }));
    floorP.position.set(cornerX, 0.045, cornerZ);
    standGroup.add(floorP);

    // İç ışık
    const innerLight = new THREE.PointLight(0xfff0dd, 0.5, pW * 2);
    innerLight.position.set(cornerX, pH * 0.6, cornerZ);
    standGroup.add(innerLight);
  }

  // Furniture — her biri kendi kaydedilmiş x,z konumunda
  S.cart.forEach((item) => {
    const color = getFurnColor(item.id);
    const group = buildFurnMeshOnly(item.id, item.x || 0, item.z || 0, color, H);
    standGroup.add(group);
  });
}

function darkenHex(hex, factor) {
  const r = ((hex >> 16) & 255) * factor;
  const g = ((hex >> 8) & 255) * factor;
  const b = (hex & 255) * factor;
  return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
}
function lightenHex(hex, factor) {
  const r = Math.min(255, ((hex >> 16) & 255) * factor);
  const g = Math.min(255, ((hex >> 8) & 255) * factor);
  const b = Math.min(255, (hex & 255) * factor);
  return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
}

// ─── ORBIT CONTROL (manual) ──────────────────────────────
let isDragging = false, prevX = 0, prevY = 0;
let theta = 0.7, phi = 0.55, radius = 14;
let targetTheta = theta, targetPhi = phi, targetRadius = radius;

const vp = document.getElementById('viewport');
vp.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  targetTheta -= (e.clientX - prevX) * 0.01;
  targetPhi = Math.max(0.1, Math.min(1.2, targetPhi - (e.clientY - prevY) * 0.008));
  prevX = e.clientX; prevY = e.clientY;
});
vp.addEventListener('wheel', e => {
  targetRadius = Math.max(5, Math.min(25, targetRadius + e.deltaY * 0.02));
  e.preventDefault();
}, { passive: false });
vp.addEventListener('touchstart', e => {
  if(e.touches.length === 1) {
    isDragging = true;
    prevX = e.touches[0].clientX;
    prevY = e.touches[0].clientY;
  }
}, {passive:true});
window.addEventListener('touchend', () => isDragging = false);
window.addEventListener('touchmove', e => {
  if(e.touches.length === 2) {
    // Pinch to zoom
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(vp._lastPinchDist) {
      const delta = vp._lastPinchDist - dist;
      targetRadius = Math.max(5, Math.min(25, targetRadius + delta * 0.04));
    }
    vp._lastPinchDist = dist;
    isDragging = false;
    return;
  }
  vp._lastPinchDist = null;
  if(!isDragging) return;
  targetTheta -= (e.touches[0].clientX - prevX) * 0.012;
  targetPhi = Math.max(0.1, Math.min(1.2, targetPhi - (e.touches[0].clientY - prevY) * 0.009));
  prevX = e.touches[0].clientX;
  prevY = e.touches[0].clientY;
}, {passive:true});

function setView(v) {
  if(v==='front') { targetTheta = 0; targetPhi = 0.4; targetRadius = 14; }
  else if(v==='side') { targetTheta = Math.PI/2; targetPhi = 0.4; targetRadius = 14; }
  else if(v==='top') { targetTheta = 0; targetPhi = 1.15; targetRadius = 18; }
  else { targetTheta = 0.7; targetPhi = 0.55; targetRadius = 14; }
}
function resetView() { setView('iso'); }

// ─── ANIMATE ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  theta += (targetTheta - theta) * 0.08;
  phi += (targetPhi - phi) * 0.08;
  radius += (targetRadius - radius) * 0.08;

  camera.position.x = radius * Math.sin(theta) * Math.cos(phi);
  camera.position.y = radius * Math.sin(phi);
  camera.position.z = radius * Math.cos(theta) * Math.cos(phi);
  camera.lookAt(0, 1.2, 0);
  renderer.render(scene, camera);
}

function resizeRenderer() {
  const vp = document.getElementById('viewport');
  const w = vp.clientWidth, h = vp.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

// Drag & drop on viewport for wall texture
document.getElementById('viewport').addEventListener('dragover', e => { e.preventDefault(); });
document.getElementById('viewport').addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) {
    const fakeInput = { files: [file] };

window.addEventListener('resize', () => { resizeRenderer(); });
setTimeout(() => { resizeRenderer(); buildStand(); animate(); }, 50);

function loadWallTexture(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataURL = e.target.result;
    S.wallTexture = dataURL;
    // Build Three.js texture from the data URL
    const img = new Image();
    img.onload = function() {
      if(S.wallTexObj) S.wallTexObj.dispose();
      const tex = new THREE.Texture(img);
      tex.needsUpdate = true;
      tex.wrapS = THREE.ClampToEdgeWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
      S.wallTexObj = tex;
      buildStand();
      renderPanel();
    };
    img.src = dataURL;
  };
  reader.readAsDataURL(file);
}

function removeWallTexture() {
  if(S.wallTexObj) { S.wallTexObj.dispose(); S.wallTexObj = null; }
  S.wallTexture = null;
  buildStand();
  renderPanel();
}

function pick(k, v) {
  S[k] = v;
  buildStand();
  renderPanel();
}

function pickColor(type, hex, val) {
  if(type === 'wall') { S.wallColor = val; S.wallColorHex = hex; }
  else { S.floorColor = val; S.floorColorHex = hex; }
  buildStand();
  renderPanel();
}

// ─── PLACEMENT MODE ──────────────────────────────────────
// pendingItem = {id,n,p,icon} when user clicked a furniture card
let pendingItem = null;
let placementMesh = null; // ghost preview mesh
const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();

// Invisible floor plane for raycasting
const floorPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
);
floorPlane.rotation.x = -Math.PI / 2;
floorPlane.position.y = 0.09;
scene.add(floorPlane);

function startPlacement(id, n, p, icon) {
  // If already in cart, remove it
  const existing = S.cart.findIndex(c => c.id === id);
  if(existing >= 0) {
    S.cart.splice(existing, 1);
    cancelPlacement();
    buildStand(); renderPanel(); return;
  }
  pendingItem = { id, n, p, icon };
  // Show ghost
  updateGhostMesh(0, 0);
  showPlacementBanner(n);
  // Cursor
  document.getElementById('viewport').style.cursor = 'crosshair';
}

function cancelPlacement() {
  pendingItem = null;
  if(placementMesh) { scene.remove(placementMesh); placementMesh = null; }
  hidePlacementBanner();
  document.getElementById('viewport').style.cursor = 'grab';
}

function showPlacementBanner(name) {
  let b = document.getElementById('place-banner');
  if(!b) {
    b = document.createElement('div');
    b.id = 'place-banner';
    b.style.cssText = `position:absolute;top:12px;left:50%;transform:translateX(-50%);
      background:rgba(232,96,44,0.92);color:#fff;font-size:12px;font-weight:600;
      padding:8px 18px;border-radius:20px;pointer-events:none;white-space:nowrap;
      font-family:'DM Sans',sans-serif;letter-spacing:0.02em;z-index:10;`;
    document.getElementById('viewport').appendChild(b);
  }
  b.textContent = `📍 "${name}" — zemine tıkla  ·  ESC iptal`;
  b.style.display = 'block';
}
function hidePlacementBanner() {
  const b = document.getElementById('place-banner');
  if(b) b.style.display = 'none';
}

function updateGhostMesh(x, z) {
  if(placementMesh) scene.remove(placementMesh);
  const H = 2.5;
  const color = getFurnColor(pendingItem.id);
  placementMesh = buildFurnMeshOnly(pendingItem.id, x, z, color, H);
  // Make it semi-transparent orange tint
  placementMesh.traverse(c => {
    if(c.isMesh) {
      c.material = c.material.clone();
      c.material.transparent = true;
      c.material.opacity = 0.6;
      c.material.color.set(0xe8602c);
    }
  });
  scene.add(placementMesh);
}

function getMousePos(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const cx = e.clientX ?? e.touches?.[0]?.clientX;
  const cy = e.clientY ?? e.touches?.[0]?.clientY;
  mouse2D.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse2D.y = -((cy - rect.top) / rect.height) * 2 + 1;
}

function getRayFloorHit(e) {
  getMousePos(e);
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObject(floorPlane);
  if(!hits.length) return null;
  const p = hits[0].point;
  // Clamp inside stand bounds
  const hw = S.w / 2 - 0.3;
  const hd = S.d / 2 - 0.3;
  const cx = Math.max(-hw, Math.min(hw, p.x));
  const cz = Math.max(-S.d/2 + 0.3, Math.min(S.d/2 - 0.3, p.z));
  return { x: cx, z: cz };
}

// Mouse move — update ghost position
vp.addEventListener('mousemove', e => {
  if(!pendingItem) return;
  const hit = getRayFloorHit(e);
  if(hit) updateGhostMesh(hit.x, hit.z);
});

// Click on viewport — place item or orbit
vp.addEventListener('click', e => {
  if(!pendingItem) return;
  if(Math.abs(e.clientX - prevX) > 4 || Math.abs(e.clientY - prevY) > 4) return; // was a drag
  const hit = getRayFloorHit(e);
  if(!hit) return;
  // Place it
  S.cart.push({ ...pendingItem, x: hit.x, z: hit.z });
  cancelPlacement();
  buildStand(); renderPanel();
});

// ESC to cancel
window.addEventListener('keydown', e => {
  if(e.key === 'Escape') cancelPlacement();
});

// Touch place
vp.addEventListener('touchend', e => {
  if(!pendingItem) return;
  const touch = e.changedTouches[0];
  const hit = getRayFloorHit({ clientX: touch.clientX, clientY: touch.clientY });
  if(hit) {
    S.cart.push({ ...pendingItem, x: hit.x, z: hit.z });
    cancelPlacement();
    buildStand(); renderPanel();
  }
}, { passive: true });

function getFurnColor(id) {
  const fColors = {
    lc1:0xe8e8e8,lc2:0xe8e8e8,lc3:0xe8e8e8,lc4:0xe8e8e8,
    ec1:0x7F77DD,ec2:0x7F77DD,ec3:0xf0c040,
    ch1:0xdddddd,ch2:0xdddddd,ch3:0xffffff,ch4:0xffffff,
    t1:0x888888,t2:0x888888,t3:0x888888,t4:0x888888,t5:0x444444,t6:0x444444,
  };
  return fColors[id] || 0x888888;
}

function buildFurnMeshOnly(id, x, z, color, H) {
  const group = new THREE.Group();

  // Material helpers
  const mat  = (c) => new THREE.MeshLambertMaterial({ color: c });
  const white = mat(0xf0f0f0);
  const chrome = mat(0xbbbbbb);
  const wood  = mat(0xc8903c);
  const darkWood = mat(0x7a5020);
  const black = mat(0x222222);
  const glass = new THREE.MeshLambertMaterial({ color:0x99ccee, transparent:true, opacity:0.35 });
  const ledMat = new THREE.MeshLambertMaterial({ color:0xffffff, emissive:0xaaccff });

  // ── LED COUNTERS ──
  if(id.startsWith('lc')) {
    const sz = id==='lc1'?1:id==='lc2'?2:id==='lc3'?3:4;
    // Main body — white box
    const body = new THREE.Mesh(new THREE.BoxGeometry(sz, 1.0, 0.55), white);
    body.position.set(0, 0.58, 0); group.add(body);
    // Top surface — slightly recessed
    const top = new THREE.Mesh(new THREE.BoxGeometry(sz+0.02, 0.04, 0.57), mat(0xe0e0e0));
    top.position.set(0, 1.09, 0); group.add(top);
    // LED strip along bottom front
    const led = new THREE.Mesh(new THREE.BoxGeometry(sz*0.9, 0.05, 0.02), ledMat);
    led.position.set(0, 0.12, 0.275); group.add(led);
    const ledLight = new THREE.PointLight(0xaaccff, 0.3, 1.5);
    ledLight.position.set(0, 0.15, 0.3); group.add(ledLight);
    // Front panel groove lines
    for(let i=1;i<sz;i++){
      const groove = new THREE.Mesh(new THREE.BoxGeometry(0.02,0.8,0.01), mat(0xcccccc));
      groove.position.set(-sz/2+i, 0.58, 0.278); group.add(groove);
    }
  }

  // ── EYE CATCHERS ──
  else if(id === 'ec1') {
    // Round eyecatcher: slim pole + round top banner
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,H*0.95,12), chrome);
    pole.position.set(0, H*0.475+0.08, 0); group.add(pole);
    // Round disc banner at top
    const disc = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,0.04,32), mat(color||0xffffff));
    disc.position.set(0, H*0.95+0.08, 0); group.add(disc);
    // Banner fabric cylinder around pole top
    const banner = new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.32,H*0.55,24,1,true), mat(color||0xffffff));
    banner.position.set(0, H*0.65+0.08, 0); group.add(banner);
    // Base foot
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,0.06,16), mat(0x888888));
    base.position.set(0, 0.03+0.08, 0); group.add(base);
  }
  else if(id === 'ec2') {
    // Straight eyecatcher: slim pole + flat rectangular banner
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,H*0.95,8), chrome);
    pole.position.set(0, H*0.475+0.08, 0); group.add(pole);
    // Rectangular banner
    const banner = new THREE.Mesh(new THREE.BoxGeometry(0.6, H*0.6, 0.02), mat(color||0xffffff));
    banner.position.set(0, H*0.65+0.08, 0.01); group.add(banner);
    // Top cap
    const cap = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.04, 0.04), mat(0x888888));
    cap.position.set(0, H*0.96+0.08, 0); group.add(cap);
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.06,0.3), mat(0x888888));
    base.position.set(0, 0.03+0.08, 0); group.add(base);
  }
  else if(id === 'ec3') {
    // Showcase: tall glass display cabinet
    const back = new THREE.Mesh(new THREE.BoxGeometry(0.65, H*0.85, 0.03), mat(0xe8e8e8));
    back.position.set(0, H*0.425+0.08, -0.22); group.add(back);
    const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.03, H*0.85, 0.45), glass);
    sideL.position.set(-0.32, H*0.425+0.08, 0); group.add(sideL);
    const sideR = new THREE.Mesh(new THREE.BoxGeometry(0.03, H*0.85, 0.45), glass);
    sideR.position.set(0.32, H*0.425+0.08, 0); group.add(sideR);
    const front = new THREE.Mesh(new THREE.BoxGeometry(0.65, H*0.85, 0.02), glass);
    front.position.set(0, H*0.425+0.08, 0.225); group.add(front);
    const topC = new THREE.Mesh(new THREE.BoxGeometry(0.67,0.04,0.47), mat(0xdddddd));
    topC.position.set(0, H*0.85+0.09, 0); group.add(topC);
    const botC = new THREE.Mesh(new THREE.BoxGeometry(0.67,0.04,0.47), mat(0xdddddd));
    botC.position.set(0, 0.09, 0); group.add(botC);
    // Internal shelf
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.02,0.4), mat(0xf0f0f0));
    shelf.position.set(0, H*0.42+0.08, 0); group.add(shelf);
  }

  // ── CHAIRS ──
  else if(id === 'ch1') {
    // Standard chair: thin seat + 4 thin legs + back
    _chair(group, 0.46, 0.44, white, mat(0xdddddd), false);
  }
  else if(id === 'ch2') {
    // Highchair standard: tall stool with footrest
    _stool(group, 0.78, white, chrome);
  }
  else if(id === 'ch3') {
    // Chair luxe: rounded seat + white frame
    _chair(group, 0.46, 0.44, mat(0xfafafa), mat(0xd8d0c0), false);
  }
  else if(id === 'ch4') {
    // Highchair luxe: tall stool with wooden seat
    _stool(group, 0.82, mat(0xd4a050), mat(0xc8903c));
  }

  // ── TABLES ──
  else if(id === 't1') { _table(group, 0.75, 0.8, 0.8, false, white, chrome); }
  else if(id === 't2') { _table(group, 1.05, 0.7, 0.7, false, white, chrome); }
  else if(id === 't3') { _table(group, 0.75, 0.65, 0.65, true, white, chrome); }
  else if(id === 't4') { _table(group, 1.05, 0.6, 0.6, true, white, chrome); }
  else if(id === 't5') { _table(group, 0.75, 0.85, 0.85, false, mat(0x333333), black); }
  else if(id === 't6') { _table(group, 1.05, 0.75, 0.75, true, mat(0x333333), black); }

  group.position.set(x, 0, z);
  group.traverse(c => { if(c.isMesh) { c.castShadow=true; c.receiveShadow=true; } });
  return group;
}

// ── Chair helper ──
function _chair(group, seatH, seatW, seatMat, legMat, rounded) {
  const seat = new THREE.Mesh(new THREE.BoxGeometry(seatW, 0.05, seatW*0.9), seatMat);
  seat.position.set(0, seatH+0.08, 0); group.add(seat);
  // Slightly padded look
  const cushion = new THREE.Mesh(new THREE.BoxGeometry(seatW*0.9, 0.04, seatW*0.82), seatMat);
  cushion.position.set(0, seatH+0.11, 0); group.add(cushion);
  // Back
  const back = new THREE.Mesh(new THREE.BoxGeometry(seatW*0.9, seatH*0.85, 0.04), seatMat);
  back.position.set(0, seatH+seatH*0.42+0.08, -seatW*0.43); group.add(back);
  // 4 legs
  const legH = seatH-0.05;
  const legR = 0.018;
  [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([lx,lz])=>{
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(legR,legR,legH,8), legMat);
    leg.position.set(lx*seatW*0.36, legH/2+0.08, lz*seatW*0.33); group.add(leg);
  });
}

// ── Stool / Highchair helper ──
function _stool(group, seatH, seatMat, legMat) {
  const seat = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,0.05,16), seatMat);
  seat.position.set(0, seatH+0.08, 0); group.add(seat);
  // Central pole
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.03,seatH*0.85,8), legMat);
  pole.position.set(0, seatH*0.43+0.08, 0); group.add(pole);
  // 4 angled feet
  [0,1,2,3].forEach(i=>{
    const angle = (i/4)*Math.PI*2;
    const foot = new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.018,0.55,6), legMat);
    foot.position.set(Math.sin(angle)*0.2, 0.2+0.08, Math.cos(angle)*0.2);
    foot.rotation.z = Math.sin(angle)*0.32;
    foot.rotation.x = Math.cos(angle)*0.32;
    group.add(foot);
  });
  // Footrest ring
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.16,0.015,8,24), legMat);
  ring.rotation.x = Math.PI/2;
  ring.position.set(0, seatH*0.45+0.08, 0); group.add(ring);
}

// ── Table helper ──
function _table(group, h, tw, td, round, topMat, legMat) {
  const topGeo = round
    ? new THREE.CylinderGeometry(tw/2, tw/2, 0.05, 32)
    : new THREE.BoxGeometry(tw, 0.05, td);
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.set(0, h+0.08, 0); group.add(top);
  // Central pedestal leg
  const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.05,h*0.88,10), legMat);
  pedestal.position.set(0, h*0.44+0.08, 0); group.add(pedestal);
  // Foot base disc
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.25,0.04,16), legMat);
  base.position.set(0, 0.03+0.08, 0); group.add(base);
  // 3 foot spokes
  [0,1,2].forEach(i=>{
    const angle = (i/3)*Math.PI*2;
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.38,0.03,0.06), legMat);
    spoke.position.set(0, 0.05+0.08, 0);
    spoke.rotation.y = angle;
    group.add(spoke);
  });
}

function toggleCart(id, n, p, icon) {
  // If pending this exact item, cancel
  if(pendingItem && pendingItem.id === id) { cancelPlacement(); return; }
  // If already placed, remove all instances
  const existing = S.cart.findIndex(c => c.id === id);
  if(existing >= 0) {
    S.cart.splice(existing, 1);
    buildStand(); renderPanel(); return;
  }
  // Start placement mode
  startPlacement(id, n, p, icon);
  renderPanel(); // highlight card as pending
}

function removeCart(i) {
  S.cart.splice(i, 1);
  buildStand(); renderPanel();
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function sendQuote() {
  const name = document.getElementById('f-name').value;
  const email = document.getElementById('f-email').value;
  if(!name || !email) { alert('Lütfen ad ve e-posta alanlarını doldurun.'); return; }
  const LAYOUT_NAMES = ['Açık ön','Sol köşe','Sağ köşe','Ada'];
  const summary = `Ad: ${name}\nE-posta: ${email}\nEtkinlik: ${document.getElementById('f-event').value}\n\nKonfigürasyon:\n- Boyut: ${S.w}m × ${S.d}m (${LAYOUT_NAMES[S.layout]})\n- Zemin: ${S.floorMat}\n- Grafik: ${S.wallGraphic?'Evet':'Hayır'}\n- Pantry: ${S.pantryPos}\n- Mobilyalar: ${S.cart.map(c=>c.n).join(', ')||'yok'}\n- Tahmini: ₺${totalPrice().toLocaleString('tr-TR')}\n\nNotlar: ${document.getElementById('f-notes').value}`;
  console.log('TEKLIF FORMU:', summary);
  closeModal();
  alert('Teklif formunuz alındı! En kısa sürede iletişime geçeceğiz.');
}
